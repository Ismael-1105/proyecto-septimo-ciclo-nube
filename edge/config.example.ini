# Plantilla de configuracion del kiosco Acceso-Facial-Lab.
# Copiar este archivo como config.ini y completar los valores reales.
# El archivo config.ini NO se versiona en git (contiene la API key).
# Las variables de entorno KIOSCO_* tienen prioridad sobre este archivo:
# KIOSCO_API_URL, KIOSCO_API_KEY, KIOSCO_PIN_PIR, KIOSCO_PIN_RELE,
# KIOSCO_SEGUNDOS_APERTURA.

[kiosco]
# URL base de la API central (por confirmar cuando se despliegue).
api_url = https://POR-CONFIRMAR.execute-api.REGION.amazonaws.com/prod

# API key para el header x-api-key (por confirmar, la entrega el equipo
# de backend; nunca subirla al repositorio).
api_key = POR-CONFIRMAR

# Pin GPIO (numeracion BCM) del sensor infrarrojo pasivo de presencia.
pin_pir = 17

# Pin GPIO (numeracion BCM) del modulo de rele de la cerradura electrica.
pin_rele = 27

# Segundos que la cerradura permanece abierta tras un acceso concedido.
segundos_apertura = 5
