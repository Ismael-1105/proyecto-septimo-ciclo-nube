name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: |
          if [ -n "$(find src -name '*.test.*' -o -name '*.spec.*' 2>/dev/null)" ]; then
            pnpm test
          else
            echo "No test files found, skipping"
          fi

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "ERROR: dist/index.html not found"; exit 1; }
          echo "Build verified:"
          ls -la dist/
